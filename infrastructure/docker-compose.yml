version: '3.8'

services:
  # Keycloak: The Identity Provider (OIDC/SSO)
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: nexus-keycloak
    environment:
      KC_HOSTNAME: auth.nexus-zta.local
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_secure_pass
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm.json
    command: start-dev --import-realm
    networks:
      - nexus-back

  # Nginx: The Zero Trust Gateway (mTLS Enforcement)
  nginx-gateway:
    image: nginx:latest
    container_name: nexus-gateway
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api-backend
    networks:
      - nexus-back

  # API Backend: Zero Trust Policy Engine
  api-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-api
    environment:
      - KEYCLOAK_URL=http://keycloak:8080
      - VAULT_DB_URL=postgres://db:5432/secrets
    networks:
      - nexus-back

  # Fail2Ban: Intrusion Prevention
  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: nexus-fail2ban
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - /var/log:/var/log:ro
      - ./fail2ban/jail.local:/etc/fail2ban/jail.local:ro

networks:
  nexus-back:
    driver: bridge

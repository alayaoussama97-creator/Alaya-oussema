worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # Logging with Client Cert Fingerprint
    log_format  zta_main  '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" "$ssl_client_s_dn" "$ssl_client_verify"';

    access_log  /var/log/nginx/access.log  zta_main;

    upstream api_server {
        server api-backend:3000;
    }

    server {
        listen 443 ssl;
        server_name nexus-zta.local;

        # Server Certificate
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # --- mTLS Configuration (Mandatory Client Certs) ---
        ssl_client_certificate /etc/nginx/certs/ca.crt; # The CA that signs client certs
        ssl_verify_client      on; # Force verification
        ssl_verify_depth       2;

        # Secure Session Mgmt
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_protocols TLSv1.3;
        ssl_prefer_server_ciphers off;

        # Pass Client Cert Info to Backend
        location / {
            if ($ssl_client_verify != SUCCESS) {
                return 403;
            }

            proxy_pass http://api_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-SSL-Client-Verify $ssl_client_verify;
            proxy_set_header X-SSL-Client-DN $ssl_client_s_dn;
            proxy_set_header X-SSL-Issuer-DN $ssl_client_i_dn;
        }

        # Security Headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubdomains; preload";
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; object-src 'none';";
    }
}
